---
services:
  wallabag:
    image: wallabag/wallabag
    restart: unless-stopped
    networks:
      - traefik
    environment:
      - MYSQL_ROOT_PASSWORD=wallaroot
      - SYMFONY__ENV__DATABASE_DRIVER=pdo_mysql
      - SYMFONY__ENV__DATABASE_HOST=db
      - SYMFONY__ENV__DATABASE_PORT=3306
      - SYMFONY__ENV__DATABASE_NAME=wallabag
      - SYMFONY__ENV__DATABASE_USER=wallabag
      - SYMFONY__ENV__DATABASE_PASSWORD=wallapass
      - SYMFONY__ENV__DATABASE_CHARSET=utf8mb4
      - SYMFONY__ENV__DATABASE_TABLE_PREFIX="wallabag_"
      - SYMFONY__ENV__MAILER_DSN=smtp://127.0.0.1
      - SYMFONY__ENV__FROM_EMAIL=attinagaoxu@gmail.com
      - SYMFONY__ENV__DOMAIN_NAME=https://wallabag.attina.io
      - SYMFONY__ENV__SERVER_NAME="wallabag"
    volumes:
      - /data/wallabag/images:/var/www/wallabag/web/assets/images
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      # http
      - "traefik.http.routers.wallabag-http.rule=Host(`wallabag.attina.io`)"
      - "traefik.http.routers.wallabag-http.entrypoints=http"
      - "traefik.http.middlewares.wallabag-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.wallabag-http.middlewares=wallabag-https-redirect"
      # https
      - "traefik.http.routers.wallabag.rule=Host(`wallabag.attina.io`)"
      - "traefik.http.routers.wallabag.entrypoints=https"
      - "traefik.http.routers.wallabag.tls=true"
      - "traefik.http.routers.wallabag.service=wallabag-http"
      # Service
      - "traefik.http.services.wallabag-http.loadbalancer.server.port=80"
      - "traefik.http.services.wallabag-http.loadbalancer.server.scheme=http"

    depends_on:
      - db
      - redis
  db:
    image: mariadb
    restart: unless-stopped
    networks:
      - traefik
    environment:
      - MYSQL_ROOT_PASSWORD=wallaroot
    volumes:
      - /data/wallabag/data:/var/lib/mysql
  redis:
    image: redis:alpine
    restart: unless-stopped    
    networks:
      - traefik

networks:
  traefik:
    external: true